<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クッキーゲーム</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #1d130d;
      --panel: #332318;
      --panel2: #24170f;
      --text: #fff3df;
      --sub: #dbc6aa;
      --accent: #ffd38a;
      --good: #9cffb2;
      --danger: #6b2525;
      --tab: #4a3020;
      --tabActive: #a7672c;
      --item: #5a3822;
      --itemCanBuy: #7a4a24;
      --itemDone: #31502c;
      --blue: #4b7cff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 8px;
      user-select: none;
      -webkit-user-select: none;
    }

    .game {
      max-width: 430px;
      margin: auto;
    }

    .top,
    .tabPage {
      background: var(--panel);
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 22px;
      margin: 4px 0 8px;
    }

    h2 {
      font-size: 16px;
      margin: 6px 0;
    }

    .cookieCount {
      font-size: 34px;
      font-weight: 900;
      margin: 4px 0;
    }

    .challengeBox {
      background: #20140d;
      border: 1px solid rgba(255, 211, 138, 0.25);
      border-radius: 12px;
      padding: 8px;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }

    .challengeBox b {
      color: var(--accent);
    }

    .challengeEnded {
      border-color: rgba(255,120,120,0.35);
      color: #ffd0d0;
    }

    .cookieWrap {
      position: relative;
      display: grid;
      place-items: center;
      margin-top: 4px;
      min-height: 180px;
    }

    #cookie {
      position: relative;
      width: 160px;
      height: 160px;
      border: none;
      border-radius: 50%;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.28) 0 12px, transparent 13px),
        radial-gradient(circle at 24% 33%, #6e381b 0 6px, transparent 7px),
        radial-gradient(circle at 64% 26%, #6a3418 0 7px, transparent 8px),
        radial-gradient(circle at 38% 55%, #6a3418 0 8px, transparent 9px),
        radial-gradient(circle at 68% 62%, #6f371a 0 7px, transparent 8px),
        radial-gradient(circle at 55% 77%, #6a3418 0 6px, transparent 7px),
        radial-gradient(circle at 78% 42%, #724020 0 5px, transparent 6px),
        radial-gradient(circle at 50% 50%, #d99a59 0%, #c87d3a 62%, #a85c27 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.12),
        inset -12px -14px 18px rgba(0,0,0,0.28),
        0 10px 20px rgba(0,0,0,0.35);
      cursor: pointer;
      transition: transform .08s ease, box-shadow .18s ease, filter .18s ease, background .18s ease;
      overflow: hidden;
    }

    #cookie::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 33% 25%, rgba(255,255,255,0.20) 0 18px, transparent 19px),
        radial-gradient(circle at 45% 34%, rgba(255,255,255,0.08) 0 22px, transparent 23px);
      pointer-events: none;
    }

    #cookie::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    #cookie:active {
      transform: scale(0.95);
    }

    #cookie.boost-all {
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.36) 0 12px, transparent 13px),
        radial-gradient(circle at 24% 33%, #8a5a12 0 6px, transparent 7px),
        radial-gradient(circle at 64% 26%, #9a6416 0 7px, transparent 8px),
        radial-gradient(circle at 38% 55%, #8f5815 0 8px, transparent 9px),
        radial-gradient(circle at 68% 62%, #9b6818 0 7px, transparent 8px),
        radial-gradient(circle at 55% 77%, #8d5f15 0 6px, transparent 7px),
        radial-gradient(circle at 78% 42%, #9a6b1c 0 5px, transparent 6px),
        radial-gradient(circle at 50% 50%, #fff2a0 0%, #f4c14a 50%, #d08a18 100%);
      box-shadow:
        0 0 24px rgba(255,215,100,0.95),
        0 0 52px rgba(255,190,80,0.45),
        inset 8px 8px 12px rgba(255,255,255,0.18),
        inset -12px -14px 18px rgba(0,0,0,0.20),
        0 10px 20px rgba(0,0,0,0.35);
      animation: cookieGlow 0.9s ease-in-out infinite alternate;
    }

    #cookie.boost-all .sparkle {
      display: block;
    }

    .sparkle {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 74% 22%, rgba(255,255,255,0.9) 0 2px, transparent 3px),
        radial-gradient(circle at 62% 72%, rgba(255,255,255,0.9) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 67%, rgba(255,255,255,0.8) 0 1px, transparent 3px),
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.8) 0 1px, transparent 3px);
      animation: sparkleMove 0.75s linear infinite;
    }

    @keyframes cookieGlow {
      from {
        filter: brightness(1);
        transform: scale(1);
      }
      to {
        filter: brightness(1.14);
        transform: scale(1.025);
      }
    }

    @keyframes sparkleMove {
      from {
        opacity: 0.4;
        transform: rotate(0deg) scale(1);
      }
      50% {
        opacity: 1;
      }
      to {
        opacity: 0.45;
        transform: rotate(18deg) scale(1.05);
      }
    }

    #floatArea {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .float {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
      pointer-events: none;
      animation: rise 0.55s ease-out forwards;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    @keyframes rise {
      to {
        opacity: 0;
        transform: translate(-50%, -46px);
      }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
      font-size: 13px;
    }

    .stats div {
      background: var(--panel2);
      border-radius: 9px;
      padding: 7px 4px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 4px 0;
      z-index: 5;
    }

    .tab,
    .mode,
    .item {
      border: none;
      border-radius: 10px;
      background: var(--tab);
      color: var(--text);
      padding: 9px;
      font-size: 13px;
      touch-action: pan-y;
    }

    .tab.active,
    .mode.active {
      background: var(--tabActive);
      font-weight: 800;
    }

    .tabPage {
      display: none;
    }

    .tabPage.active {
      display: block;
    }

    .modes {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .mode {
      width: 80px;
    }

    .item {
      display: block;
      width: 100%;
      margin: 7px 0;
      text-align: left;
      background: var(--item);
      font-size: 14px;
    }

    .item.canBuy {
      background: var(--itemCanBuy);
      box-shadow: 0 0 0 2px rgba(255,210,130,0.22);
    }

    .item.locked {
      opacity: 0.55;
    }

    .item.done {
      background: var(--itemDone);
    }

    .desc {
      color: var(--sub);
      font-size: 12px;
      margin-top: 3px;
    }

    .price {
      color: var(--accent);
      font-weight: 900;
    }

    #message {
      min-height: 20px;
      margin-top: 6px;
      color: var(--good);
      font-size: 13px;
      font-weight: 800;
    }

    #goldenCookie {
      display: none;
      position: fixed;
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 50%;
      z-index: 999;
      touch-action: pan-y;
      cursor: pointer;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.32) 0 8px, transparent 9px),
        radial-gradient(circle at 24% 33%, #a37117 0 4px, transparent 5px),
        radial-gradient(circle at 64% 26%, #9b6a12 0 5px, transparent 6px),
        radial-gradient(circle at 38% 55%, #a67418 0 6px, transparent 7px),
        radial-gradient(circle at 68% 62%, #94600f 0 5px, transparent 6px),
        radial-gradient(circle at 55% 77%, #a26d16 0 4px, transparent 5px),
        radial-gradient(circle at 50% 50%, #fff1a0 0%, #f2c24d 55%, #d28a12 100%);
      box-shadow:
        0 0 20px rgba(255,215,80,0.85),
        inset 6px 6px 9px rgba(255,255,255,0.18),
        inset -8px -9px 12px rgba(0,0,0,0.22),
        0 10px 20px rgba(0,0,0,0.30);
      animation: goldenBob 1s ease-in-out infinite alternate;
    }

    #goldenCookie::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,230,120,0.35), transparent 65%);
      pointer-events: none;
    }

    @keyframes goldenBob {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-6px) scale(1.03); }
    }

    #monsterWrap {
      display: none;
      position: fixed;
      z-index: 998;
      width: 104px;
      text-align: center;
      touch-action: pan-y;
    }

    #cookieMonster {
      position: relative;
      width: 86px;
      height: 86px;
      border: none;
      border-radius: 50%;
      background:
        radial-gradient(circle at 31% 28%, white 0 9px, transparent 10px),
        radial-gradient(circle at 64% 28%, white 0 9px, transparent 10px),
        radial-gradient(circle at 34% 30%, #111 0 4px, transparent 5px),
        radial-gradient(circle at 66% 30%, #111 0 4px, transparent 5px),
        radial-gradient(circle at 50% 63%, #111 0 17px, transparent 18px),
        radial-gradient(circle at 50% 52%, #6aa4ff 0%, #3568cb 70%, #234087 100%);
      box-shadow:
        0 0 20px rgba(100,160,255,0.45),
        inset 7px 8px 10px rgba(255,255,255,0.16),
        inset -9px -11px 14px rgba(0,0,0,0.25),
        0 10px 20px rgba(0,0,0,0.35);
      animation: monsterBob 0.9s ease-in-out infinite alternate;
    }

    #cookieMonster::before {
      content: "";
      position: absolute;
      left: 31px;
      top: 58px;
      width: 8px;
      height: 8px;
      background: #dba45e;
      border-radius: 50%;
      box-shadow:
        13px 4px 0 #dba45e,
        26px -1px 0 #dba45e;
    }

    @keyframes monsterBob {
      from { transform: translateY(0) rotate(-2deg); }
      to   { transform: translateY(-5px) rotate(2deg); }
    }

    .monsterHp {
      width: 104px;
      height: 10px;
      background: rgba(0,0,0,0.45);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.18);
    }

    #monsterHpFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff6262, #ffd36e);
    }

    #monsterHpText {
      margin-top: 2px;
      font-size: 11px;
      color: #fff;
      text-shadow: 0 1px 2px #000;
      font-weight: 800;
    }

    .danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.45;
    }
  </style>
</head>

<body>
<main class="game">
  <section class="top">
    <h1>クッキーゲーム</h1>

    <div class="cookieCount">
      <span id="cookies">0</span>
    </div>

    <div id="challengeBox" class="challengeBox"></div>

    <div class="cookieWrap">
      <button id="cookie" aria-label="クッキー">
        <span class="sparkle"></span>
      </button>
      <div id="floatArea"></div>
    </div>

    <button id="goldenCookie" aria-label="金のクッキー"></button>

    <div id="monsterWrap">
      <button id="cookieMonster" aria-label="クッキーモンスター"></button>
      <div class="monsterHp">
        <div id="monsterHpFill"></div>
      </div>
      <div id="monsterHpText">HP</div>
    </div>

    <div class="stats">
      <div>タップ <b id="power">1</b></div>
      <div>毎秒 <b id="cps">0</b></div>
      <div>ランク <b id="rank">初心者</b></div>
    </div>

    <div id="message"></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="shopTab">強化</button>
    <button class="tab" data-tab="researchTab">研究</button>
    <button class="tab" data-tab="missionTab">任務</button>
    <button class="tab" data-tab="achievementTab">実績</button>
    <button class="tab" data-tab="prestigeTab">転生</button>
  </nav>

  <section id="shopTab" class="tabPage active">
    <h2>購入モード</h2>
    <div class="modes">
      <button class="mode active" data-mode="1">1個</button>
      <button class="mode" data-mode="10">10個</button>
      <button class="mode" data-mode="max">最大</button>
    </div>
    <div id="shop"></div>
  </section>

  <section id="researchTab" class="tabPage">
    <div id="research"></div>
  </section>

  <section id="missionTab" class="tabPage">
    <div id="missions"></div>
  </section>

  <section id="achievementTab" class="tabPage">
    <div id="achievements"></div>
  </section>

  <section id="prestigeTab" class="tabPage">
    <p>今回100万クッキー以上で転生可能。進行リセットの代わりに永久倍率が上がる。</p>
    <p>転生後は3分ごとの目標チャレンジが始まる。達成するたび、その周回中の全生産倍率が2倍。</p>
    <div>転生ポイント: <b id="prestige">0</b></div>
    <div>永久倍率: <b id="prestigeBonus">1.00</b>倍</div>
    <button id="prestigeBtn" class="item">転生する</button>
    <button id="resetBtn" class="item danger">完全リセット</button>
  </section>
</main>

<script>
const saveKey = "cookie_game_compact_v5";
const OFFLINE_LIMIT_SECONDS = 60 * 60 * 8;
const GOLDEN_BOOST_DURATION = 30000;
const GOLDEN_BOOST_MULTIPLIER = 3;
const CHALLENGE_STAGE_SECONDS = 180;

const UPGRADES = [
  { id: "finger", name: "強い指", type: "click", value: 1, base: 15, growth: 1.25, desc: "1タップ +1" },
  { id: "grandma", name: "おばあちゃん", type: "cps", value: 1, base: 50, growth: 1.25, desc: "毎秒 +1" },
  { id: "oven", name: "オーブン", type: "cps", value: 5, base: 250, growth: 1.28, desc: "毎秒 +5" },
  { id: "factory", name: "工場", type: "cps", value: 25, base: 1500, growth: 1.3, desc: "毎秒 +25" },
  { id: "bank", name: "クッキー銀行", type: "cps", value: 150, base: 10000, growth: 1.32, desc: "毎秒 +150" },
  { id: "portal", name: "異世界クッキー炉", type: "cps", value: 1000, base: 100000, growth: 1.35, desc: "毎秒 +1000" },
  { id: "moonBakery", name: "月面ベーカリー", type: "cps", value: 7500, base: 1000000, growth: 1.38, desc: "毎秒 +7500。転生なしだと重い" },
  { id: "timeOven", name: "時空オーブン", type: "cps", value: 50000, base: 15000000, growth: 1.4, desc: "毎秒 +5万" },
  { id: "galaxyFactory", name: "銀河工場", type: "cps", value: 350000, base: 250000000, growth: 1.42, desc: "毎秒 +35万" },
  { id: "blackHoleMixer", name: "ブラックホールミキサー", type: "cps", value: 2500000, base: 5000000000, growth: 1.45, desc: "毎秒 +250万" },
  { id: "universeOven", name: "宇宙焼成炉", type: "cps", value: 20000000, base: 100000000000, growth: 1.48, desc: "毎秒 +2000万" },
  { id: "godFinger", name: "神の指", type: "click", value: 2000000, base: 300000000000, growth: 1.48, desc: "1タップ +200万。終盤〜転生後向け" },
  { id: "cookieSingularity", name: "クッキー特異点", type: "cps", value: 250000000, base: 5000000000000, growth: 1.5, desc: "毎秒 +2.5億。終盤用" }
];

const RESEARCH = [
  { id: "click20", name: "指の研究", cost: 2000, desc: "タップ生産 +20%" },
  { id: "auto20", name: "自動化研究", cost: 5000, desc: "自動生産 +20%" },
  { id: "cheap", name: "仕入れ最適化", cost: 15000, desc: "アップグレード価格 -10%" },
  { id: "golden", name: "金色反応炉", cost: 50000, desc: "金のクッキー出現が少し早くなる" }
];

const ACHIEVEMENTS = [
  { id: "firstClick", name: "初クリック", desc: "1回クリック", cond: () => state.totalClicks >= 1 },
  { id: "hundred", name: "小さな一歩", desc: "総クッキー100", cond: () => state.totalCookies >= 100 },
  { id: "tenK", name: "職人", desc: "総クッキー1万", cond: () => state.totalCookies >= 10000 },
  { id: "million", name: "クッキー王", desc: "総クッキー100万", cond: () => state.totalCookies >= 1000000 },
  { id: "grandma10", name: "大家族", desc: "おばあちゃん10人", cond: () => state.upgrades.grandma >= 10 },
  { id: "cps100", name: "自動生産者", desc: "毎秒100", cond: () => baseCps() >= 100 },
  { id: "firstPrestige", name: "転生者", desc: "転生する", cond: () => state.prestigeRuns >= 1 },
  { id: "challenge3", name: "3分突破", desc: "転生チャレンジ第1目標達成", cond: () => state.bestChallengeStage >= 2 },
  { id: "monsterSlayer", name: "討伐者", desc: "クッキーモンスターを倒す", cond: () => state.monstersDefeated >= 1 }
];

const MISSIONS = [
  { id: "click100", name: "100回クリック", reward: 500, cond: () => state.totalClicks >= 100 },
  { id: "grandma5", name: "おばあちゃん5人", reward: 1000, cond: () => state.upgrades.grandma >= 5 },
  { id: "cps50", name: "毎秒50到達", reward: 3000, cond: () => baseCps() >= 50 },
  { id: "factory3", name: "工場3つ", reward: 10000, cond: () => state.upgrades.factory >= 3 },
  { id: "run100k", name: "今回10万", reward: 25000, cond: () => state.runCookies >= 100000 }
];

let state = freshState();
let buyMode = "1";
let audioCtx = null;
let boostUntil = 0;
let activeTab = "shopTab";

let goldenSpawnTimer = null;
let goldenHideTimer = null;
let goldenVisible = false;

let monsterSpawnTimer = null;
let monsterHideTimer = null;
let monsterVisible = false;
let monster = {
  level: 1,
  hp: 1,
  maxHp: 1
};

function freshState() {
  const upgrades = {};
  const research = {};
  const achievements = {};
  const missions = {};

  UPGRADES.forEach(u => upgrades[u.id] = 0);
  RESEARCH.forEach(r => research[r.id] = false);
  ACHIEVEMENTS.forEach(a => achievements[a.id] = false);
  MISSIONS.forEach(m => missions[m.id] = false);

  return {
    cookies: 0,
    cookieRemainder: 0,
    totalCookies: 0,
    runCookies: 0,
    totalClicks: 0,

    prestige: 0,
    prestigeRuns: 0,

    runStart: Date.now(),
    challengeActive: false,
    challengeFailed: false,
    challengeStage: 1,
    challengeBonus: 1,
    bestChallengeStage: 1,

    monstersDefeated: 0,

    upgrades,
    research,
    achievements,
    missions,
    lastSave: Date.now()
  };
}

function ensureState() {
  const base = freshState();

  state.upgrades = { ...base.upgrades, ...(state.upgrades || {}) };
  state.research = { ...base.research, ...(state.research || {}) };
  state.achievements = { ...base.achievements, ...(state.achievements || {}) };
  state.missions = { ...base.missions, ...(state.missions || {}) };

  state.cookies = Math.floor(Number(state.cookies) || 0);
  state.cookieRemainder = Number(state.cookieRemainder) || 0;
  state.totalCookies = Math.floor(Number(state.totalCookies) || 0);
  state.runCookies = Math.floor(Number(state.runCookies) || 0);
  state.totalClicks = Math.floor(Number(state.totalClicks) || 0);

  state.prestige = Math.floor(Number(state.prestige) || 0);
  state.prestigeRuns = Math.floor(Number(state.prestigeRuns) || 0);

  state.runStart = Number(state.runStart) || Date.now();
  state.challengeActive = Boolean(state.challengeActive);
  state.challengeFailed = Boolean(state.challengeFailed);
  state.challengeStage = Math.max(1, Math.floor(Number(state.challengeStage) || 1));
  state.challengeBonus = Math.max(1, Number(state.challengeBonus) || 1);
  state.bestChallengeStage = Math.max(1, Math.floor(Number(state.bestChallengeStage) || 1));

  state.monstersDefeated = Math.floor(Number(state.monstersDefeated) || 0);

  state.lastSave = Number(state.lastSave) || Date.now();

  if (state.cookieRemainder < 0 || state.cookieRemainder >= 1) {
    const fixed = Math.floor(state.cookieRemainder);
    state.cookies += fixed;
    state.cookieRemainder -= fixed;
  }
}

function $(id) {
  return document.getElementById(id);
}

function addTap(el, handler) {
  let startX = 0;
  let startY = 0;
  let pointerId = null;
  let moved = false;

  el.addEventListener("pointerdown", e => {
    startX = e.clientX;
    startY = e.clientY;
    pointerId = e.pointerId;
    moved = false;
  });

  el.addEventListener("pointermove", e => {
    if (pointerId !== e.pointerId) return;

    const dx = Math.abs(e.clientX - startX);
    const dy = Math.abs(e.clientY - startY);

    if (dx > 12 || dy > 12) moved = true;
  });

  el.addEventListener("pointerup", e => {
    if (pointerId !== e.pointerId) return;

    const dx = Math.abs(e.clientX - startX);
    const dy = Math.abs(e.clientY - startY);

    pointerId = null;

    if (moved || dx > 12 || dy > 12) return;

    e.preventDefault();
    handler(e);
  });

  el.addEventListener("pointercancel", () => {
    pointerId = null;
    moved = true;
  });
}

function fmt(n) {
  n = Math.floor(Number(n) || 0);

  if (n < 1000) return String(n);
  if (n < 1000000) return (n / 1000).toFixed(1).replace(".0", "") + "K";
  if (n < 1000000000) return (n / 1000000).toFixed(1).replace(".0", "") + "M";
  if (n < 1000000000000) return (n / 1000000000).toFixed(1).replace(".0", "") + "B";

  return (n / 1000000000000).toFixed(1).replace(".0", "") + "T";
}

function fmtTime(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function prestigeMultiplier() {
  return 1 + state.prestige * 0.2;
}

function goldenBoostMultiplier() {
  return Date.now() < boostUntil ? GOLDEN_BOOST_MULTIPLIER : 1;
}

function challengeMultiplier() {
  return state.challengeBonus || 1;
}

function totalProductionMultiplier() {
  return prestigeMultiplier() * goldenBoostMultiplier() * challengeMultiplier();
}

function upgradeDiscount() {
  return state.research.cheap ? 0.9 : 1;
}

function costOf(u) {
  return Math.floor(u.base * Math.pow(u.growth, state.upgrades[u.id]) * upgradeDiscount());
}

function baseClickPower() {
  let v = 1;

  UPGRADES.forEach(u => {
    if (u.type === "click") v += state.upgrades[u.id] * u.value;
  });

  if (state.research.click20) v *= 1.2;

  return v * prestigeMultiplier();
}

function currentClickPower() {
  return baseClickPower() * goldenBoostMultiplier() * challengeMultiplier();
}

function baseCps() {
  let v = 0;

  UPGRADES.forEach(u => {
    if (u.type === "cps") v += state.upgrades[u.id] * u.value;
  });

  if (state.research.auto20) v *= 1.2;

  return v * prestigeMultiplier();
}

function currentCps() {
  return baseCps() * goldenBoostMultiplier() * challengeMultiplier();
}

function earn(amount) {
  amount = Number(amount);

  if (!Number.isFinite(amount) || amount <= 0) return 0;

  const total = state.cookieRemainder + amount;
  const whole = Math.floor(total);

  state.cookieRemainder = total - whole;

  if (whole <= 0) return 0;

  state.cookies += whole;
  state.totalCookies += whole;
  state.runCookies += whole;

  return whole;
}

function spend(amount) {
  amount = Math.floor(Number(amount) || 0);

  if (state.cookies < amount) return false;

  state.cookies -= amount;
  return true;
}

function challengeTarget(stage) {
  return Math.floor(1200 * Math.pow(stage, 1.6) * Math.pow(3.5, stage - 1));
}

function challengeElapsedSeconds() {
  return Math.max(0, (Date.now() - state.runStart) / 1000);
}

function updateChallenge() {
  if (state.prestigeRuns <= 0) return;

  const elapsed = challengeElapsedSeconds();

  if (state.challengeActive) {
    let changed = false;

    while (
      state.challengeActive &&
      state.runCookies >= challengeTarget(state.challengeStage) &&
      elapsed <= state.challengeStage * CHALLENGE_STAGE_SECONDS
    ) {
      state.challengeBonus *= 2;
      state.challengeStage += 1;
      state.bestChallengeStage = Math.max(state.bestChallengeStage, state.challengeStage);
      changed = true;
      showMessage(`目標達成：全生産 x${fmt(state.challengeBonus)}`);
    }

    if (
      state.challengeActive &&
      elapsed > state.challengeStage * CHALLENGE_STAGE_SECONDS &&
      state.runCookies < challengeTarget(state.challengeStage)
    ) {
      state.challengeActive = false;
      state.challengeFailed = true;
      changed = true;
      showMessage("時間切れ：チャレンジ終了");
    }

    if (changed) saveGame();
  }
}

function renderChallenge() {
  const box = $("challengeBox");

  box.classList.remove("challengeEnded");

  if (state.prestigeRuns <= 0) {
    box.innerHTML = `
      <b>転生チャレンジ</b><br>
      転生後に開始。3分ごとの目標を達成すると、その周回中の全生産倍率が2倍。
    `;
    return;
  }

  const elapsed = challengeElapsedSeconds();
  const target = challengeTarget(state.challengeStage);
  const deadline = state.challengeStage * CHALLENGE_STAGE_SECONDS;
  const left = Math.max(0, deadline - elapsed);
  const progress = Math.min(100, Math.floor((state.runCookies / target) * 100));

  if (state.challengeActive) {
    box.innerHTML = `
      <b>転生チャレンジ中</b><br>
      経過 ${fmtTime(elapsed)} / 第${state.challengeStage}目標まで残り ${fmtTime(left)}<br>
      目標 ${fmt(target)} / 現在 ${fmt(state.runCookies)}（${progress}%）<br>
      周回倍率 x${fmt(state.challengeBonus)}
    `;
    return;
  }

  box.classList.add("challengeEnded");
  box.innerHTML = `
    <b>転生チャレンジ終了</b><br>
    経過 ${fmtTime(elapsed)} / 到達 第${Math.max(1, state.challengeStage - 1)}目標<br>
    周回倍率 x${fmt(state.challengeBonus)} は次の転生まで維持
  `;
}

function playSound(kind) {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx) audioCtx = new AudioContext();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value =
      kind === "cookie" ? 600 :
      kind === "golden" ? 850 :
      kind === "monster" ? 180 :
      280;

    osc.type = "sine";

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.055);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.055);
  } catch (e) {}
}

function showMessage(text) {
  $("message").textContent = text;
  clearTimeout(showMessage.timer);
  showMessage.timer = setTimeout(() => $("message").textContent = "", 1500);
}

function showFloat(text) {
  const div = document.createElement("div");
  div.className = "float";
  div.textContent = text;
  $("floatArea").appendChild(div);
  setTimeout(() => div.remove(), 600);
}

function updateTopOnly() {
  updateChallenge();

  $("cookies").textContent = fmt(state.cookies);
  $("power").textContent = fmt(currentClickPower());
  $("cps").textContent = fmt(currentCps());
  $("rank").textContent = rankName();
  $("prestige").textContent = state.prestige;
  $("prestigeBonus").textContent = prestigeMultiplier().toFixed(2);

  const cookie = $("cookie");
  const boostActive = Date.now() < boostUntil;

  cookie.classList.toggle("boost-all", boostActive);

  renderChallenge();

  if (monsterVisible) {
    renderMonsterHp();
  }
}

function tapCookie() {
  const gained = earn(currentClickPower());

  state.totalClicks += 1;

  playSound("cookie");
  showFloat("+" + fmt(gained));
  checkAchievements();
  updateTopOnly();
}

addTap($("cookie"), tapCookie);

function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  const target = buyMode === "max" ? Infinity : Number(buyMode);
  let bought = 0;

  while (bought < target) {
    const cost = costOf(u);

    if (!spend(cost)) break;

    state.upgrades[id] += 1;
    bought += 1;

    if (bought > 5000) break;
  }

  if (bought > 0) {
    playSound("upgrade");
    showMessage(`${u.name} ×${bought}`);
    checkAchievements();
    saveGame();
    renderActiveTab();
    updateTopOnly();
  }
}

function buyResearch(id) {
  const r = RESEARCH.find(x => x.id === id);

  if (state.research[id]) return;
  if (!spend(r.cost)) return;

  state.research[id] = true;

  playSound("upgrade");
  showMessage(`${r.name} 解放`);
  checkAchievements();
  saveGame();
  renderActiveTab();
  updateTopOnly();
}

function claimMission(id) {
  const m = MISSIONS.find(x => x.id === id);

  if (state.missions[id]) return;
  if (!m.cond()) return;

  state.missions[id] = true;

  const gained = earn(m.reward);

  playSound("upgrade");
  showMessage(`報酬 +${fmt(gained)}`);
  saveGame();
  renderActiveTab();
  updateTopOnly();
}

function renderShop() {
  const box = $("shop");
  box.innerHTML = "";

  UPGRADES.forEach(u => {
    const cost = costOf(u);
    const btn = document.createElement("button");

    btn.className = "item";

    if (state.cookies >= cost) btn.classList.add("canBuy");

    btn.innerHTML = `
      <b>${u.name}</b>
      <div class="price">${fmt(cost)} クッキー</div>
      <div class="desc">${u.desc} / 所持 ${state.upgrades[u.id]}</div>
    `;

    addTap(btn, () => buyUpgrade(u.id));
    box.appendChild(btn);
  });
}

function renderResearch() {
  const box = $("research");
  box.innerHTML = "";

  RESEARCH.forEach(r => {
    const btn = document.createElement("button");

    btn.className = "item";

    if (!state.research[r.id] && state.cookies >= r.cost) btn.classList.add("canBuy");
    if (state.research[r.id]) btn.classList.add("done");

    btn.innerHTML = `
      <b>${r.name}</b>
      <div class="price">${state.research[r.id] ? "解放済み" : fmt(r.cost) + " クッキー"}</div>
      <div class="desc">${r.desc}</div>
    `;

    addTap(btn, () => buyResearch(r.id));
    box.appendChild(btn);
  });
}

function renderMissions() {
  const box = $("missions");
  box.innerHTML = "";

  MISSIONS.forEach(m => {
    const done = m.cond();
    const claimed = state.missions[m.id];

    const btn = document.createElement("button");

    btn.className = "item";

    if (done && !claimed) btn.classList.add("canBuy");
    if (claimed) btn.classList.add("done");

    btn.innerHTML = `
      <b>${claimed ? "✅" : done ? "🎁" : "⬛"} ${m.name}</b>
      <div class="price">報酬 ${fmt(m.reward)}</div>
      <div class="desc">${claimed ? "受け取り済み" : done ? "タップで受け取り" : "未達成"}</div>
    `;

    addTap(btn, () => claimMission(m.id));
    box.appendChild(btn);
  });
}

function renderAchievements() {
  const box = $("achievements");
  box.innerHTML = "";

  ACHIEVEMENTS.forEach(a => {
    const unlocked = state.achievements[a.id];
    const div = document.createElement("div");

    div.className = "item " + (unlocked ? "done" : "locked");

    div.innerHTML = `
      <b>${unlocked ? "✅" : "⬛"} ${a.name}</b>
      <div class="desc">${a.desc}</div>
    `;

    box.appendChild(div);
  });
}

function renderPrestige() {
  $("prestigeBtn").disabled = state.runCookies < 1000000;
}

function renderActiveTab() {
  if (activeTab === "shopTab") renderShop();
  if (activeTab === "researchTab") renderResearch();
  if (activeTab === "missionTab") renderMissions();
  if (activeTab === "achievementTab") renderAchievements();
  if (activeTab === "prestigeTab") renderPrestige();
}

function renderAllTabs() {
  renderShop();
  renderResearch();
  renderMissions();
  renderAchievements();
  renderPrestige();
}

function rankName() {
  const t = state.totalCookies;

  if (t >= 1000000000000) return "宇宙";
  if (t >= 1000000000) return "神";
  if (t >= 10000000) return "王";
  if (t >= 1000000) return "大企業";
  if (t >= 100000) return "経営者";
  if (t >= 10000) return "職人";
  if (t >= 1000) return "見習い";

  return "初心者";
}

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!state.achievements[a.id] && a.cond()) {
      state.achievements[a.id] = true;
      showMessage(`実績解除: ${a.name}`);
    }
  });
}

document.querySelectorAll(".mode").forEach(btn => {
  addTap(btn, () => {
    buyMode = btn.dataset.mode;

    document.querySelectorAll(".mode").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.querySelectorAll(".tab").forEach(btn => {
  addTap(btn, () => {
    activeTab = btn.dataset.tab;

    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tabPage").forEach(p => p.classList.remove("active"));

    btn.classList.add("active");
    $(activeTab).classList.add("active");

    renderActiveTab();
  });
});

function prestigeReset() {
  if (state.runCookies < 1000000) return;

  const gain = Math.max(1, Math.floor(Math.sqrt(Math.floor(state.runCookies) / 1000000)));

  const keepTotal = state.totalCookies;
  const keepClicks = state.totalClicks;
  const keepPrestige = state.prestige + gain;
  const keepAchievements = state.achievements;
  const keepBestStage = state.bestChallengeStage;
  const keepMonsterKills = state.monstersDefeated;
  const keepPrestigeRuns = state.prestigeRuns + 1;

  state = freshState();

  state.totalCookies = keepTotal;
  state.totalClicks = keepClicks;
  state.prestige = keepPrestige;
  state.prestigeRuns = keepPrestigeRuns;
  state.achievements = keepAchievements;
  state.bestChallengeStage = keepBestStage;
  state.monstersDefeated = keepMonsterKills;

  state.runStart = Date.now();
  state.challengeActive = true;
  state.challengeFailed = false;
  state.challengeStage = 1;
  state.challengeBonus = 1;

  boostUntil = 0;

  playSound("upgrade");
  showMessage(`転生 +${gain} / チャレンジ開始`);
  saveGame();
  updateTopOnly();
  renderAllTabs();
}

addTap($("prestigeBtn"), prestigeReset);

addTap($("resetBtn"), () => {
  if (!confirm("完全にリセットする？")) return;

  localStorage.removeItem(saveKey);

  state = freshState();
  boostUntil = 0;

  clearTimeout(goldenSpawnTimer);
  clearTimeout(goldenHideTimer);
  clearTimeout(monsterSpawnTimer);
  clearTimeout(monsterHideTimer);

  goldenVisible = false;
  monsterVisible = false;

  $("goldenCookie").style.display = "none";
  $("monsterWrap").style.display = "none";

  scheduleGoldenCookie();
  scheduleMonster();

  updateTopOnly();
  renderAllTabs();
});

function saveGame() {
  state.lastSave = Date.now();
  localStorage.setItem(saveKey, JSON.stringify(state));
}

function loadGame() {
  const raw = localStorage.getItem(saveKey);

  if (!raw) return;

  try {
    state = JSON.parse(raw);
    ensureState();

    const now = Date.now();
    const seconds = Math.min(Math.max(0, now - state.lastSave) / 1000, OFFLINE_LIMIT_SECONDS);
    const gained = earn(baseCps() * challengeMultiplier() * seconds);

    if (gained > 0) {
      showMessage(`放置 +${fmt(gained)}`);
    }
  } catch (e) {
    state = freshState();
  }
}

function scheduleGoldenCookie() {
  clearTimeout(goldenSpawnTimer);

  if (goldenVisible) return;

  const min = state.research.golden ? 10000 : 18000;
  const max = state.research.golden ? 28000 : 45000;
  const wait = min + Math.random() * (max - min);

  goldenSpawnTimer = setTimeout(showGoldenCookie, wait);
}

function placeFixedElement(el, size, minY) {
  const pad = 12;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const minX = pad;
  const maxX = Math.max(minX, vw - size - pad);

  const maxY = Math.max(minY, vh - size - 24);

  const x = minX + Math.random() * Math.max(1, maxX - minX);
  const y = minY + Math.random() * Math.max(1, maxY - minY);

  el.style.left = x + "px";
  el.style.top = y + "px";
}

function showGoldenCookie() {
  if (goldenVisible) return;

  goldenVisible = true;
  goldenSpawnTimer = null;

  const btn = $("goldenCookie");

  placeFixedElement(btn, 72, 90);

  btn.style.display = "block";

  clearTimeout(goldenHideTimer);
  goldenHideTimer = setTimeout(() => {
    hideGoldenCookie(true);
  }, 8000);
}

function hideGoldenCookie(shouldReschedule) {
  goldenVisible = false;

  clearTimeout(goldenHideTimer);
  goldenHideTimer = null;

  $("goldenCookie").style.display = "none";

  if (shouldReschedule) {
    scheduleGoldenCookie();
  }
}

function collectGoldenCookie() {
  if (!goldenVisible) return;

  hideGoldenCookie(false);

  const r = Math.random();

  if (r < 0.5) {
    const gained = earn(Math.max(100, currentCps() * 60, currentClickPower() * 50));
    showMessage(`金 +${fmt(gained)}`);
  } else {
    boostUntil = Date.now() + GOLDEN_BOOST_DURATION;
    showMessage(`金: 全生産${GOLDEN_BOOST_MULTIPLIER}倍`);
  }

  playSound("golden");
  checkAchievements();
  saveGame();
  updateTopOnly();
  renderActiveTab();
  scheduleGoldenCookie();
}

addTap($("goldenCookie"), collectGoldenCookie);

function monsterLevel() {
  const totalLevel = Math.max(1, Math.floor(Math.log10(state.totalCookies + 1000)) - 2);
  const prestigeLevel = Math.floor(state.prestige / 3);
  const killLevel = Math.floor(state.monstersDefeated / 5);

  return Math.max(1, totalLevel + prestigeLevel + killLevel);
}

function scheduleMonster() {
  clearTimeout(monsterSpawnTimer);

  if (monsterVisible) return;

  const level = monsterLevel();
  const min = Math.max(22000, 52000 - level * 1200);
  const max = Math.max(42000, 90000 - level * 1400);
  const wait = min + Math.random() * (max - min);

  monsterSpawnTimer = setTimeout(showMonster, wait);
}

function showMonster() {
  if (monsterVisible) return;

  monsterVisible = true;
  monsterSpawnTimer = null;

  const level = monsterLevel();
  const click = Math.max(1, currentClickPower());
  const hp = Math.floor(click * (9 + level * 2.2) + Math.sqrt(Math.max(1, currentCps())) * (8 + level));

  monster.level = level;
  monster.maxHp = Math.max(30, hp);
  monster.hp = monster.maxHp;

  const wrap = $("monsterWrap");

  placeFixedElement(wrap, 104, 120);

  wrap.style.display = "block";
  renderMonsterHp();

  clearTimeout(monsterHideTimer);
  monsterHideTimer = setTimeout(() => {
    hideMonster(true);
  }, 16000);
}

function hideMonster(shouldReschedule) {
  monsterVisible = false;

  clearTimeout(monsterHideTimer);
  monsterHideTimer = null;

  $("monsterWrap").style.display = "none";

  if (shouldReschedule) {
    scheduleMonster();
  }
}

function renderMonsterHp() {
  const ratio = Math.max(0, monster.hp / monster.maxHp);
  $("monsterHpFill").style.width = Math.floor(ratio * 100) + "%";
  $("monsterHpText").textContent = `Lv.${monster.level} HP ${fmt(monster.hp)} / ${fmt(monster.maxHp)}`;
}

function hitMonster() {
  if (!monsterVisible) return;

  const damage = Math.max(1, Math.floor(currentClickPower()));
  monster.hp -= damage;

  playSound("monster");
  renderMonsterHp();

  if (monster.hp <= 0) {
    defeatMonster();
  }
}

addTap($("cookieMonster"), hitMonster);

function defeatMonster() {
  hideMonster(false);

  state.monstersDefeated += 1;

  const level = monster.level;
  const r = Math.random();

  if (r < 0.52) {
    const multiplier = Math.min(10, 2 + Math.floor(level / 3));
    const duration = Math.min(90000, 18000 + level * 4000);

    boostUntil = Date.now() + duration;

    showMessage(`モンスター討伐：全生産${multiplier}倍`);
    applyMonsterBoost(multiplier, duration);
  } else {
    const result = grantMonsterUpgrade(level);
    showMessage(`モンスター討伐：${result.name} +${result.count}`);
  }

  playSound("golden");
  checkAchievements();
  saveGame();
  updateTopOnly();
  renderActiveTab();
  scheduleMonster();
}

function applyMonsterBoost(multiplier, duration) {
  const oldMultiplier = GOLDEN_BOOST_MULTIPLIER;

  monsterTempMultiplier = Math.max(monsterTempMultiplier, multiplier);
  monsterTempUntil = Math.max(monsterTempUntil, Date.now() + duration);
}

let monsterTempMultiplier = 1;
let monsterTempUntil = 0;

function monsterBoostMultiplier() {
  if (Date.now() < monsterTempUntil) return monsterTempMultiplier;
  monsterTempMultiplier = 1;
  return 1;
}

function goldenBoostMultiplier() {
  const golden = Date.now() < boostUntil ? GOLDEN_BOOST_MULTIPLIER : 1;
  const monsterBoost = monsterBoostMultiplier();
  return Math.max(golden, monsterBoost);
}

function grantMonsterUpgrade(level) {
  const maxTier = Math.min(UPGRADES.length - 1, Math.max(1, Math.floor(level * 1.15)));
  const affordablePower = Math.max(5000, state.totalCookies * 0.08 + state.runCookies * 0.35 + state.prestige * 20000);

  let candidates = UPGRADES.filter((u, index) => {
    return index <= maxTier && u.base <= affordablePower * (6 + level);
  });

  if (candidates.length === 0) {
    candidates = UPGRADES.slice(0, Math.min(3, UPGRADES.length));
  }

  const selected = candidates[Math.floor(Math.random() * candidates.length)];
  const count = Math.min(5, 1 + Math.floor(level / 7));

  state.upgrades[selected.id] += count;

  return {
    name: selected.name,
    count
  };
}

window.addEventListener("resize", () => {
  if (goldenVisible) placeFixedElement($("goldenCookie"), 72, 90);
  if (monsterVisible) placeFixedElement($("monsterWrap"), 104, 120);
});

loadGame();
ensureState();
updateTopOnly();
renderAllTabs();
scheduleGoldenCookie();
scheduleMonster();

setInterval(() => {
  earn(currentCps() / 20);
  updateTopOnly();
}, 50);

setInterval(() => {
  checkAchievements();
  renderActiveTab();
  updateTopOnly();
}, 1000);

setInterval(saveGame, 5000);
</script>
</body>
