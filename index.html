<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>クッキーゲーム 修正版</title>
<style>
  body{
    margin:0;
    font-family:system-ui,-apple-system,sans-serif;
    background:#21160f;
    color:#fff3df;
    text-align:center;
    padding:18px;
  }
  .box{
    max-width:560px;
    margin:auto;
    background:#332318;
    border-radius:18px;
    padding:18px;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  h1{margin:0 0 12px;font-size:28px}
  .num{font-size:34px;font-weight:800;margin:8px 0}
  .sub{color:#d8c3a5;margin:6px 0 16px}
  #cookie{
    width:210px;
    height:210px;
    border-radius:50%;
    border:0;
    margin:16px auto;
    display:block;
    background:
      radial-gradient(circle at 35% 30%, #6b3f20 0 9px, transparent 10px),
      radial-gradient(circle at 65% 40%, #6b3f20 0 11px, transparent 12px),
      radial-gradient(circle at 48% 65%, #6b3f20 0 10px, transparent 11px),
      radial-gradient(circle at 70% 72%, #6b3f20 0 8px, transparent 9px),
      radial-gradient(circle, #d89447, #8e4d22);
    box-shadow:inset -14px -16px 22px rgba(0,0,0,.3), 0 18px 28px rgba(0,0,0,.35);
    cursor:pointer;
  }
  #cookie:active{transform:scale(.94);filter:brightness(1.15)}
  .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:12px 0;
  }
  .stat{
    background:#21160f;
    border-radius:12px;
    padding:10px;
  }
  .label{font-size:13px;color:#d8c3a5}
  .value{font-size:22px;font-weight:800}
  .upgrade{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:0;
    border-radius:12px;
    background:#563720;
    color:#fff3df;
    font-size:16px;
    text-align:left;
    cursor:pointer;
  }
  .upgrade:disabled{
    opacity:.45;
    cursor:not-allowed;
  }
  .price{float:right;color:#ffd08a;font-weight:800}
  .small{
    margin-top:12px;
    padding:9px 12px;
    border:0;
    border-radius:999px;
    background:#21160f;
    color:#fff3df;
  }
  #msg{min-height:24px;color:#9cffb2;font-weight:700}
  noscript{
    display:block;
    margin:16px;
    color:#ff8888;
    font-weight:700;
  }
</style>
</head>
<body>
<div class="box">
  <h1>クッキーゲーム</h1>
  <div class="label">クッキー</div>
  <div id="cookies" class="num">0</div>

  <button id="cookie" onclick="tapCookie()"></button>

  <div class="stats">
    <div class="stat">
      <div class="label">1タップ</div>
      <div id="clickPower" class="value">1</div>
    </div>
    <div class="stat">
      <div class="label">1秒あたり</div>
      <div id="cps" class="value">0</div>
    </div>
  </div>

  <h2>アップグレード</h2>

  <button id="u1" class="upgrade" onclick="buy(1)">
    強い指 <span id="p1" class="price">15</span><br>
    <span class="label">1タップ +1　所持: <span id="o1">0</span></span>
  </button>

  <button id="u2" class="upgrade" onclick="buy(2)">
    おばあちゃん <span id="p2" class="price">50</span><br>
    <span class="label">1秒あたり +1　所持: <span id="o2">0</span></span>
  </button>

  <button id="u3" class="upgrade" onclick="buy(3)">
    オーブン <span id="p3" class="price">250</span><br>
    <span class="label">1秒あたり +5　所持: <span id="o3">0</span></span>
  </button>

  <button id="u4" class="upgrade" onclick="buy(4)">
    工場 <span id="p4" class="price">1500</span><br>
    <span class="label">1秒あたり +25　所持: <span id="o4">0</span></span>
  </button>

  <button class="small" onclick="saveGame()">保存</button>
  <button class="small" onclick="resetGame()">リセット</button>
  <div id="msg"></div>

  <noscript>JavaScriptが無効なので動きません。SafariやChromeで開いてください。</noscript>
</div>

<script>
var cookies = 0;
var owned = [0,0,0,0,0];

var baseCost = [0,15,50,250,1500];
var growth = [0,1.18,1.22,1.25,1.28];
var clickAdd = [0,1,0,0,0];
var cpsAdd = [0,0,1,5,25];

function el(id){ return document.getElementById(id); }

function fmt(n){
  n = Math.floor(n);
  if(n < 1000) return String(n);
  if(n < 1000000) return (Math.floor(n/100)/10) + "K";
  return (Math.floor(n/100000)/10) + "M";
}

function price(i){
  return Math.floor(baseCost[i] * Math.pow(growth[i], owned[i]));
}

function clickPower(){
  return 1 + owned[1] * clickAdd[1];
}

function cps(){
  return owned[2] * cpsAdd[2] + owned[3] * cpsAdd[3] + owned[4] * cpsAdd[4];
}

function update(){
  el("cookies").innerText = fmt(cookies);
  el("clickPower").innerText = fmt(clickPower());
  el("cps").innerText = fmt(cps());

  for(var i=1;i<=4;i++){
    el("p"+i).innerText = fmt(price(i));
    el("o"+i).innerText = owned[i];
    el("u"+i).disabled = cookies < price(i);
  }
}

function tapCookie(){
  cookies += clickPower();
  update();
}

function buy(i){
  var c = price(i);
  if(cookies < c) return;
  cookies -= c;
  owned[i] += 1;
  el("msg").innerText = "購入しました";
  update();
  setTimeout(function(){ el("msg").innerText = ""; }, 900);
}

function saveGame(){
  try{
    localStorage.setItem("cookie_game_fixed", JSON.stringify({cookies:cookies, owned:owned}));
    el("msg").innerText = "保存しました";
  }catch(e){
    el("msg").innerText = "保存できませんでした";
  }
}

function loadGame(){
  try{
    var raw = localStorage.getItem("cookie_game_fixed");
    if(!raw) return;
    var data = JSON.parse(raw);
    cookies = Number(data.cookies) || 0;
    if(data.owned && data.owned.length) owned = data.owned;
  }catch(e){}
}

function resetGame(){
  cookies = 0;
  owned = [0,0,0,0,0];
  try{ localStorage.removeItem("cookie_game_fixed"); }catch(e){}
  update();
}

loadGame();
update();

setInterval(function(){
  cookies += cps() / 10;
  update();
}, 100);
</script>
</body>
</html>
