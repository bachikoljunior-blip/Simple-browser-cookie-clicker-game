name: Build Android App Bundle

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/app-store-submission-b70mad
    paths:
      - "www/**"
      - "android/**"
      - "capacitor.config.json"
      - "package.json"
      - ".github/workflows/android-release.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install npm dependencies
        run: npm ci

      - name: Build www/ and sync Capacitor web assets into the Android project
        run: npm run cap:sync

      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release App Bundle (.aab)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: cookiestrateger-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
